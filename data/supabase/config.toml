# config.toml — Supabase CLI configuration for the sous-chef-ios data track.
#
# This file is normally generated by `supabase init`. The Supabase CLI was
# not installed on the data Builder's machine during the foundation phase
# (track-data §5 task 3 acceptance check failed: `supabase` binary absent),
# so the file is hand-authored from the documented v1.200+ defaults and
# committed verbatim per dc-04 — "Commit config.toml so every developer's
# stack is identical".
#
# When the Supabase CLI lands on Dave's machine, run:
#
#     cd ~/Sous-Chef-Claude2/data
#     supabase init --force         # regenerates config.toml + .gitignore
#     git diff supabase/config.toml # confirm only version-bumps changed
#
# Depends on:     nothing.
# Depended on by: `supabase start`, `supabase db reset`, `supabase db push`.

# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "sous-chef-claude2"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in these
# schemas will get API endpoints. `public` is always included. `app_private`
# is deliberately NOT listed — its helper functions are for RLS + triggers,
# never callable over PostgREST (dc-04 §RLS).
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returned from a view, table, or stored procedure.
# Defensive: matches contract §3.4's 1000-row hard cap.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. Pin to 17 to match Supabase cloud
# (dc-04 baseline). track-data §9 Q1 asks the Conductor to confirm the
# minor; for v1 we accept whatever 17.x the CLI ships.
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# Mailpit captures auth emails locally; configured for OTP flow tests.
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# 50 MiB — the per-request upload cap. Bucket-level limits (8 MiB on
# cookbook-images) are enforced by storage.buckets.file_size_limit; see
# schemas/04-storage.sql.
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and
# for constructing URLs used in emails.
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
# OTP-only path per ADR-0003. No magic links.
otp_length = 6
otp_expiry = 600

# Sign in with Apple — provisioning is deferred to Dave (Apple Developer
# account + .p8 key). Track-data §5 tasks 2 and 17 wire this up against the
# real cloud projects. For local dev, the provider is disabled.
[auth.external.apple]
enabled = false
client_id = ""
secret = ""
url = ""

# The Go backend connects to Postgres directly (ADR-0011) — no edge
# functions are deployed in v1. Section retained for forward-compat.
[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

[analytics]
enabled = false
port = 54327
backend = "postgres"
