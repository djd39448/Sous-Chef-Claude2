# project.yml — XcodeGen specification for the SousChef iOS app target.
#
# Depends on:     XcodeGen (≥ 2.45) installed via Homebrew on the build host
#                 and the SousChefKit Swift Package adjacent to this file.
# Depended on by: the Makefile (`make gen`) and any developer who needs to
#                 regenerate SousChef.xcodeproj from source. The generated
#                 project.pbxproj is committed for reviewers but is treated
#                 as a build artifact — this file is the source of truth.
# Why it exists:  hand-editing project.pbxproj is `dc-00`-hostile (huge,
#                 generated, merge-conflict-prone). XcodeGen lets the project
#                 layout live as a small reviewable YAML file. When this file
#                 changes, `make gen` regenerates the .xcodeproj; the diff in
#                 the .pbxproj is mechanical and reviewable as a generated
#                 artifact.

name: SousChef
options:
  bundleIdPrefix: com.djd39448
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  SousChefKit:
    path: SousChefKit

targets:
  SousChef:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SousChef
    info:
      path: SousChef/Info.plist
      properties:
        CFBundleDisplayName: Sous Chef
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.djd39448.souschef
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: SousChefKit
        product: Domain
      - package: SousChefKit
        product: API
      - package: SousChefKit
        product: Auth
      - package: SousChefKit
        product: Markdown
      - package: SousChefKit
        product: ImageCache
